{% extends "base.html" %}

{% block tytul %}Logowanie{% endblock %}

{% block tresc %}
    <h1>Logowanie</h1>
    {% if blad %}
        <p style="color: red;">{{ blad }}</p>
    {% endif %}
    <form method="post">
        <label>Email:</label><br>
        <input type="email" name="email" placeholder="anna@test.pl" required><br><br>
        <label>Haslo:</label><br>
        <input type="password" name="haslo" placeholder="haslo123" required><br><br>
        <button type="submit">Zaloguj</button>
    </form>
    <p><small>Konto testowe: anna@test.pl / haslo123</small></p>
{% endblock %}
